<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: 'Montserrat', sans-serif;
      height:100vh;
      overflow:hidden;
    }

    .container{
      width:100%;
      height:100vh;
      position:relative;
      background-image: url("background.png");
      background-position:center;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      padding:30px 60px;
    }

    /* NAVBAR */
    .top-bar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .nav-left,
    .nav-right{
      display:flex;
      gap:20px;
      align-items:center;
    }

    .nav-link,
    .countdown{
      border:1px solid rgba(0,0,0,0.15);
      padding:10px 22px;
      font-size:12px;
      letter-spacing:2px;
      color:#222;
      text-transform:uppercase;
      background:rgba(255,255,255,0.4);
    }

    .logo{
      text-align:center;
    }

    .logo h2{
      font-size:18px;
      font-weight:600;
      letter-spacing:4px;
      color:#111;
    }

    /* CENTER CONTENT */
    .content{
      text-align:center;
      margin-top:-60px;
    }

    .content h1{
      font-size:68px;
      font-weight:300;
      letter-spacing:10px;
      color:#111;
      margin-bottom:20px;
    }

    .content p{
      max-width:600px;
      margin:auto;
      color:#555;
      line-height:1.8;
      font-size:15px;
    }

    .notify-btn{
      margin-top:35px;
      padding:14px 45px;
      border:none;
      background:#111;
      color:white;
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
      cursor:pointer;
      transition:0.3s;
    }

    .notify-btn:hover{
      background:#333;
      transform:translateY(-2px);
    }

    /* FOOTER */
    .footer{
      text-align:center;
      color:#666;
      font-size:12px;
      line-height:1.8;
    }

    .socials{
      margin-top:10px;
      display:flex;
      gap:15px;
      justify-content:center;
    }

    .socials a{
      text-decoration:none;
      color:#111;
      font-size:14px;
      transition:0.3s;
    }

    .socials a:hover{
      opacity:0.6;
    }

    /* Responsive */
    @media(max-width:768px){

      .container{
        padding:20px;
      }

      .top-bar{
        flex-direction:column;
        gap:20px;
      }

      .content h1{
        font-size:40px;
        letter-spacing:5px;
      }

      .content p{
        font-size:14px;
      }

      .nav-left,
      .nav-right{
        gap:10px;
      }

      .nav-link,
      .countdown{
        padding:8px 14px;
        font-size:10px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- TOP -->
    <div class="top-bar">

      <div class="nav-left">
        <div class="nav-link">About</div>
        <div class="nav-link">Contact</div>
      </div>

      <div class="logo">
        <h2>TRIADA</h2>
      </div>

      <div class="nav-right">
        <div class="countdown">
          <span id="days">35</span> Days Left
        </div>
      </div>

    </div>

    <!-- CENTER -->
    <div class="content">
      <h1>COMING SOON</h1>

      <p>
        We're currently working on creating something fantastic.
        We'll be here soon, subscribe to be notified.
      </p>

      <button class="notify-btn">
        Notify Me
      </button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p>Website by InfoStyle</p>
      <p>© 2026 All Rights Reserved.</p>

      <div class="socials">
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">Instagram</a>
      </div>
    </div>

  </div>

  <script>
    // Countdown Example
    let days = 35;

    const dayElement = document.getElementById("days");

    setInterval(() => {
      if(days > 0){
        days--;
        dayElement.innerText = days;
      }
    }, 86400000);

    // Button Action
    document.querySelector(".notify-btn").addEventListener("click", () => {
      alert("Thank you! Notification feature coming soon.");
    });
  </script>

</body>
</html>
